<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>양희탁 이력서</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #FAF8F4;
    --sidebar:  #F0EBE1;
    --border:   #D8CFC0;
    --white:    #FFFFFF;
    --org:      #C45000;
    --org-lt:   #FFF4EE;
    --blk:      #2C2C2A;
    --gray:     #5F5E5A;
    --muted:    #888780;
    --hint:     #B4B2A9;
    --hover:    #E8E0D4;
    --card-hi:  #FFF8F3;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
    color: var(--blk);
    font-size: 13px;
    line-height: 1.6;
  }

  /* ── 레이아웃 ── */
  .app {
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* ── 사이드바 ── */
  .sidebar {
    width: 220px;
    min-width: 220px;
    background: var(--sidebar);
    border-right: 3px solid var(--org);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  .sidebar-header {
    padding: 22px 18px 16px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-name {
    font-size: 16px;
    font-weight: 700;
    color: var(--blk);
    letter-spacing: 0.3px;
  }

  .sidebar-title {
    font-size: 11px;
    color: var(--muted);
    margin-top: 3px;
  }

  /* 네비게이션 */
  .nav-section { padding: 12px 12px 4px; }

  .nav-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--hint);
    letter-spacing: 0.8px;
    text-transform: uppercase;
    padding: 0 6px;
    margin-bottom: 4px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 8px;
    border-radius: 6px;
    font-size: 12px;
    color: var(--gray);
    cursor: pointer;
    transition: background 0.12s;
    user-select: none;
  }

  .nav-item:hover { background: var(--hover); }

  .nav-item.active {
    background: var(--blk);
    color: var(--bg);
  }

  .nav-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: currentColor;
    opacity: 0.4;
    flex-shrink: 0;
  }

  .nav-item.active .nav-dot {
    opacity: 1;
    background: var(--org);
  }

  /* 하단 버튼 */
  .sidebar-footer {
    margin-top: auto;
    padding: 12px;
    border-top: 1px solid var(--border);
  }

  .print-btn {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 8px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg);
    font-size: 12px;
    color: var(--gray);
    cursor: pointer;
    font-family: inherit;
    transition: background 0.12s;
  }

  .print-btn:hover { background: var(--hover); }

  /* ── 메인 ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }

  /* 상단바 */
  .topbar {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg);
    flex-shrink: 0;
  }

  .topbar-title { font-size: 15px; font-weight: 600; color: var(--blk); }
  .topbar-meta { font-size: 11px; color: var(--hint); margin-top: 2px; }

  .view-toggle {
    display: flex;
    gap: 3px;
    background: var(--sidebar);
    border-radius: 6px;
    padding: 3px;
  }

  .toggle-btn {
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 4px;
    border: none;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-family: inherit;
    transition: all 0.12s;
  }

  .toggle-btn:hover { color: var(--blk); }

  .toggle-btn.active {
    background: var(--blk);
    color: var(--bg);
  }

  /* 콘텐츠 영역 */
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
  }

  /* 섹션 레이블 */
  .section-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--hint);
    letter-spacing: 0.8px;
    text-transform: uppercase;
    margin-bottom: 10px;
    margin-top: 20px;
  }

  .section-label:first-child { margin-top: 0; }

  /* 카드 */
  .card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 18px;
    margin-bottom: 10px;
  }

  .card.highlight {
    background: var(--card-hi);
    border-color: #E8C4A8;
    border-left: 3px solid var(--org);
  }

  .card-head {
    display: flex;
    align-items: baseline;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 3px;
  }

  .card-co {
    font-size: 14px;
    font-weight: 600;
    color: var(--blk);
  }

  .card-period {
    font-size: 11px;
    color: var(--hint);
  }

  .badge {
    display: inline-block;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 10px;
    background: var(--org-lt);
    color: var(--org);
    font-weight: 600;
  }

  .card-project {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .card-role {
    font-size: 12px;
    color: var(--org);
    font-weight: 500;
    margin-bottom: 10px;
  }

  .card-summary {
    font-size: 12px;
    color: var(--gray);
    margin-bottom: 10px;
    font-style: italic;
    border-left: 2px solid var(--border);
    padding-left: 10px;
  }

  .bullets {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .bullets li {
    font-size: 12px;
    color: var(--gray);
    display: flex;
    gap: 8px;
    align-items: flex-start;
  }

  .bullets li::before {
    content: '';
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--org);
    margin-top: 6px;
    flex-shrink: 0;
  }

  /* 수치 카드 (상세 뷰용) */
  .stats-row {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    flex-wrap: wrap;
  }

  .stat-item {
    background: var(--sidebar);
    border-radius: 6px;
    padding: 8px 12px;
    min-width: 90px;
  }

  .stat-val {
    font-size: 15px;
    font-weight: 700;
    color: var(--org);
  }

  .stat-lbl {
    font-size: 10px;
    color: var(--muted);
    margin-top: 1px;
  }

  /* 스킬 테이블 */
  .skill-group { margin-bottom: 16px; }

  .skill-group-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--blk);
    margin-bottom: 8px;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--border);
  }

  .skill-row {
    display: flex;
    gap: 12px;
    padding: 6px 0;
    border-bottom: 1px solid #F0EBE1;
    font-size: 12px;
  }

  .skill-name {
    min-width: 130px;
    font-weight: 500;
    color: var(--org);
  }

  .skill-detail { color: var(--gray); }

  .has-expand { cursor: pointer; }
  .has-expand:hover { background: #F7F3ED; border-radius: 4px; }
  .expand-arrow { font-size: 10px; color: var(--org); margin-left: 5px; }
  .skill-expand { display: none; padding: 6px 0 6px 14px; border-bottom: 1px solid #F0EBE1; }
  .skill-expand.open { display: block; }
  .expand-list { margin: 0; padding-left: 16px; list-style: disc; }
  .expand-list li { font-size: 11px; color: var(--gray); padding: 2px 0; line-height: 1.5; }

  /* 태그 */
  .tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }

  .tag {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 4px;
    background: var(--sidebar);
    color: var(--gray);
    border: 1px solid var(--border);
  }

  /* 타임라인 뷰 */
  .timeline {
    position: relative;
    padding-left: 24px;
  }

  .timeline::before {
    content: '';
    position: absolute;
    left: 7px;
    top: 8px;
    bottom: 8px;
    width: 1px;
    background: var(--border);
  }

  .tl-item {
    position: relative;
    margin-bottom: 20px;
  }

  .tl-dot {
    position: absolute;
    left: -21px;
    top: 6px;
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--border);
    border: 2px solid var(--bg);
  }

  .tl-item.current .tl-dot {
    background: var(--org);
  }

  .tl-period {
    font-size: 10px;
    color: var(--hint);
    margin-bottom: 3px;
  }

  .tl-co {
    font-size: 13px;
    font-weight: 600;
    color: var(--blk);
  }

  .tl-role {
    font-size: 11px;
    color: var(--org);
    margin-top: 1px;
  }

  .tl-desc {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* 프로필 뷰 */
  .profile-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }

  .profile-item { }

  .profile-label {
    font-size: 10px;
    color: var(--hint);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 2px;
  }

  .profile-value {
    font-size: 13px;
    color: var(--blk);
    font-weight: 500;
  }

  /* 햄버거 버튼 */
  .hamburger {
    display: none;
    position: fixed;
    top: 12px;
    left: 12px;
    z-index: 200;
    background: var(--org);
    border: none;
    border-radius: 6px;
    width: 36px;
    height: 36px;
    cursor: pointer;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 5px;
    padding: 0;
  }
  .hamburger span {
    display: block;
    width: 18px;
    height: 2px;
    background: #fff;
    border-radius: 2px;
    transition: all 0.2s;
  }

  /* 모바일 오버레이 */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 99;
  }
  .overlay.open { display: block; }

  /* 모바일 반응형 */
  @media (max-width: 640px) {
    .hamburger { display: flex; }
    .sidebar {
      position: fixed;
      left: -240px;
      top: 0;
      height: 100%;
      z-index: 100;
      width: 240px;
      transition: left 0.25s ease;
      box-shadow: none;
    }
    .sidebar.open { left: 0; box-shadow: 4px 0 16px rgba(0,0,0,0.12); }
    .main { width: 100%; }
    .topbar { padding-left: 56px; }
  }

  /* 인쇄 */
  @media print {
    .sidebar, .topbar { display: none; }
    .main { overflow: visible; }
    .content { padding: 0; overflow: visible; }
    .app { height: auto; }
    .card { break-inside: avoid; }
  }

  /* 스크롤바 */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    <div class="nav-section">
      <div class="nav-label">프로젝트</div>
      <div class="nav-item" data-section="projects">
        <div class="nav-dot"></div> 개인 프로젝트
      </div>
    </div>

    <div class="nav-section">
      
    </div>

    <div class="sidebar-footer">
      <button class="print-btn" onclick="window.print()">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M4 6V2h8v4M2 6h12v7H2zM5 12h6"/>
        </svg>
        인쇄 / PDF 저장
      </button>
    </div>
  </div>

  <!-- ── 메인 ── -->
  <div class="main">
    <div class="topbar">
      <div>
        <div class="topbar-title" id="topbarTitle">전체 경력</div>
        <div class="topbar-meta" id="topbarMeta">10개사  ·  2012 ~ 2026</div>
      </div>
      <div class="view-toggle" id="viewToggle">
        <button class="toggle-btn active" data-view="summary">요약</button>
        <button class="toggle-btn" data-view="detail">설계도</button>
        <button class="toggle-btn" data-view="timeline">학력 · 병역</button>
      </div>
    </div>

    <div class="content" id="content"></div>
  </div>

</div>

<script>
let DATA = {};
let currentSection = 'career-all';
let currentView = 'summary';

// 데이터 로드
function loadData() {
  DATA = window._INLINE_DATA;
  render();
}

// ── 렌더러 ──────────────────────────────────
function render() {
  const content = document.getElementById('content');
  const toggle = document.getElementById('viewToggle');

  // 토글 표시: 프로필(요약/설계도/학력·병역), 경력(요약/상세/타임라인)
  const showToggle = currentSection.startsWith('career') || currentSection === 'profile';
  toggle.style.display = showToggle ? 'flex' : 'none';

  // 프로필 섹션일 때 버튼 텍스트 전환
  const btns = toggle.querySelectorAll('.toggle-btn');
  if (currentSection === 'profile') {
    btns[0].textContent = '요약';
    btns[1].textContent = '설계도';
    btns[2].textContent = '학력 · 병역';
  } else {
    btns[0].textContent = '요약';
    btns[1].style.display='none';
    btns[2].style.display='none';
    btns[1].textContent = '상세';
    btns[2].textContent = '타임라인';
  }

  switch(currentSection) {
    case 'profile':
      if (currentView === 'timeline') content.innerHTML = renderEducation();
      else content.innerHTML = renderProfile();
      break;
    case 'coverletter': content.innerHTML = renderCoverLetter(); toggle.style.display='none'; break;
    case 'education':    content.innerHTML = renderEducation(); break;
    case 'career-all':   content.innerHTML = renderCareer(DATA.career); break;
    case 'career-public':content.innerHTML = renderCareer(DATA.career.filter(c => c.domain.includes('공공AI'))); break;
    case 'career-game':  content.innerHTML = renderCareer(DATA.career.filter(c => c.domain.includes('게임'))); break;
    case 'career-other': content.innerHTML = renderCareer(DATA.career.filter(c => !c.domain.includes('게임') && !c.domain.includes('공공AI'))); break;
    case 'skills':       content.innerHTML = renderSkills(); toggle.style.display='none'; break;
    case 'projects':     content.innerHTML = renderProjects(); toggle.style.display='none'; break;
    case 'portfolio':    content.innerHTML = renderPortfolio(); toggle.style.display='none'; break;
  }
}

// 프로필
function renderProfile() {
  const p = DATA.profile;
  const view = currentView;

  if (view === 'detail' && p.saju) {
    const s = p.saju;
    const dw = s.daewoon;
    return `
      <div class="section-label">명조 재해석 — 설계도</div>
      <div class="card">
        <div style="font-size:15px;font-weight:700;color:var(--org);margin-bottom:10px;">${s.summary}</div>
        <p style="font-size:12px;color:var(--gray);line-height:1.9;white-space:pre-line;">${s.desc}</p>
      </div>

      <div class="section-label" style="margin-top:18px;">핵심 키워드</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:4px;">
        ${s.keywords.map(k => `
          <div class="card" style="padding:10px 14px;flex:0 0 auto;min-width:140px;">
            <div style="font-size:11px;font-weight:700;color:var(--org);margin-bottom:3px;">${k.label}</div>
            <div style="font-size:10px;color:var(--muted);">${k.desc}</div>
          </div>
        `).join('')}
      </div>

      <div class="section-label" style="margin-top:18px;">원국 · 신살 요약</div>
      <div class="card">
        <div style="font-size:11px;font-weight:700;color:var(--org);margin-bottom:8px;">사주 원국</div>
        <div style="overflow-x:auto;">
          <table style="width:100%;font-size:11px;border-collapse:collapse;margin-bottom:14px;">
            <tr style="background:var(--sidebar);">
              <td style="padding:5px 8px;color:var(--muted);">구분</td>
              ${s.wonguk.map(w => `<td style="padding:5px 8px;font-weight:600;color:var(--blk);text-align:center;">${w.col}</td>`).join('')}
            </tr>
            <tr><td style="padding:5px 8px;color:var(--muted);">천간</td>${s.wonguk.map(w=>`<td style="padding:5px 8px;text-align:center;font-weight:600;color:var(--org);">${w.gan}</td>`).join('')}</tr>
            <tr style="background:var(--sidebar);"><td style="padding:5px 8px;color:var(--muted);">지지</td>${s.wonguk.map(w=>`<td style="padding:5px 8px;text-align:center;">${w.ji}</td>`).join('')}</tr>
            <tr><td style="padding:5px 8px;color:var(--muted);">십성</td>${s.wonguk.map(w=>`<td style="padding:5px 8px;text-align:center;font-size:10px;color:var(--muted);">${w.star}</td>`).join('')}</tr>
            <tr style="background:var(--sidebar);"><td style="padding:5px 8px;color:var(--muted);">12운성</td>${s.wonguk.map(w=>`<td style="padding:5px 8px;text-align:center;font-size:10px;color:var(--muted);">${w.un}</td>`).join('')}</tr>
          </table>
        </div>
        <div style="font-size:11px;font-weight:700;color:var(--org);margin-bottom:8px;">신살 요약</div>
        ${s.sinsal.map((ss,i) => `
          <div style="display:flex;gap:10px;padding:5px 0;border-bottom:1px solid var(--border);font-size:11px;">
            <div style="min-width:130px;font-weight:600;color:var(--blk);">${ss.name}</div>
            <div style="color:var(--gray);">${ss.keyword}</div>
          </div>
        `).join('')}
      </div>

      <div class="section-label" style="margin-top:18px;">대기만성 개화 시기 — 저점 매수 구간</div>
      <div class="card">
        <div style="background:#FFF5EC;border-left:3px solid var(--org);padding:10px 14px;border-radius:4px;margin-bottom:14px;">
          <div style="font-size:12px;font-weight:700;color:var(--org);">${dw.sewoon_star}</div>
          <div style="font-size:11px;color:var(--gray);margin-top:4px;">${dw.theme}</div>
        </div>
        ${dw.list.map(l => {
          const isCurrent = l.keyword.includes('현재');
          const isPrev = l.keyword.includes('▶');
          return `
          <div style="display:flex;gap:10px;padding:6px 0;border-bottom:1px solid var(--border);font-size:11px;${isCurrent?'background:#FFF5EC;margin:0 -16px;padding:6px 16px;':''}">
            <div style="min-width:100px;color:${isCurrent?'var(--org)':'var(--muted)'};">${l.period}</div>
            <div style="min-width:60px;color:var(--muted);">${l.year}</div>
            <div style="min-width:36px;font-weight:600;color:${isCurrent?'var(--org)':'var(--blk)'};">${l.gan}</div>
            <div style="color:var(--gray);flex:1;">${l.keyword}</div>
          </div>`;
        }).join('')}
        <div style="font-size:10px;color:var(--muted);margin-top:10px;font-style:italic;">현재 위치: ${dw.current}</div>
      </div>
    `;
  }

  return `
    <div class="section-label">기본 정보</div>
    <div class="card">
      <div class="profile-grid">
        <div class="profile-item">
          <div class="profile-label">이름</div>
          <div class="profile-value">${p.name} (${p.name_hanja})</div>
        </div>
        <div class="profile-item">
          <div class="profile-label">생년월일</div>
          <div class="profile-value">${p.birth}</div>
        </div>
        <div class="profile-item">
          <div class="profile-label">연락처</div>
          <div class="profile-value">문의는 이력서 앱 내 연락처 참조</div>
        </div>
        <div class="profile-item">
          <div class="profile-label">이메일</div>
          <div class="profile-value">-</div>
        </div>
        <div class="profile-item">
          <div class="profile-label">거주지</div>
          <div class="profile-value">경기도</div>
        </div>
        <div class="profile-item">
          <div class="profile-label">총 경력</div>
          <div class="profile-value">${p.total_career}</div>
        </div>
      </div>
      <div class="profile-label" style="margin-bottom:6px;">투입 가능일</div>
      <div class="profile-value" style="color:var(--org)">${p.available}</div>
    </div>
    <div class="section-label" style="margin-top:20px;">소개</div>
    <div class="card">
      <p style="font-size:13px;color:var(--gray);line-height:1.8;">${p.objective}</p>
    </div>
  `;
}

// 자기소개서
function renderCoverLetter() {
  const cl = DATA.coverletter;
  if (!cl) return `<div class="card" style="text-align:center;padding:40px;color:var(--muted);">준비 중입니다</div>`;
  return `
    <div class="section-label">자기소개서</div>
    ${cl.sections.map((s, i) => `
      <div class="card" style="margin-bottom:12px;">
        <div style="display:flex;align-items:baseline;gap:10px;margin-bottom:10px;">
          <div style="font-size:11px;font-weight:700;color:var(--org);min-width:20px;">${i + 1}.</div>
          <div style="font-size:13px;font-weight:700;color:var(--blk);line-height:1.5;">${s.title}</div>
        </div>
        <p style="font-size:12px;color:var(--gray);line-height:1.9;white-space:pre-line;margin-left:30px;">${s.content}</p>
      </div>
    `).join('')}
  `;
}

// 학력
function renderEducation() {
  return `
    <div class="section-label">학력 및 병역</div>
    ${DATA.education.map(e => `
      <div class="card">
        <div class="card-co">${e.school}</div>
        ${e.major ? `<div class="card-role">${e.major}</div>` : ''}
        <div style="font-size:12px;color:var(--hint);margin-bottom:${e.note ? '8px' : '0'}">${e.period}${e.gpa ? '  ·  학점 ' + e.gpa : ''}</div>
        ${e.note ? `<div style="font-size:11px;color:var(--muted);font-style:italic;border-left:2px solid var(--border);padding-left:8px">${e.note}</div>` : ''}
      </div>
    `).join('')}
  `;
}

// 경력 — 뷰 분기
function renderCareer(list) {
  if (currentView === 'timeline') return renderTimeline(list);
  if (currentView === 'detail')   return renderCareerDetail(list);
  return renderCareerSummary(list);
}

// 경력 요약 뷰
function renderCareerSummary(list) {
  const recent = list.filter(c => parseInt(c.period.slice(0,4)) >= 2020);
  const old    = list.filter(c => parseInt(c.period.slice(0,4)) < 2020);
  let html = '';

  if (recent.length) {
    html += '<div class="section-label">최근 경력</div>';
    html += recent.map(c => `
      <div class="card ${c.status === '재직중' ? 'highlight' : ''}">
        <div class="card-head">
          <span class="card-co">${c.company}</span>
          <span class="card-period">${c.period}</span>
          ${c.status ? `<span class="badge">${c.status}</span>` : ''}
        </div>
        <div class="card-project">${c.project}</div>
        <div class="card-role">${c.role}</div>
        <ul class="bullets">
          ${c.bullets.slice(0,3).map(b => `<li>${b}</li>`).join('')}
        </ul>
      </div>
    `).join('');
  }

  if (old.length) {
    html += '<div class="section-label" style="margin-top:20px;">이전 경력</div>';
    html += old.map(c => `
      <div class="card">
        <div class="card-head">
          <span class="card-co">${c.company}</span>
          <span class="card-period">${c.period}</span>
        </div>
        <div class="card-project">${c.project}</div>
        <div class="card-role">${c.role}</div>
        <div class="card-summary">${c.summary}</div>
      </div>
    `).join('');
  }

  return html;
}

// 경력 상세 뷰
function renderCareerDetail(list) {
  return list.map(c => `
    <div class="card ${c.status === '재직중' ? 'highlight' : ''}" style="margin-bottom:14px">
      <div class="card-head">
        <span class="card-co">${c.company}</span>
        <span class="card-period">${c.period}</span>
        ${c.status ? `<span class="badge">${c.status}</span>` : ''}
      </div>
      <div class="card-project">${c.project}</div>
      <div class="card-role">${c.role}</div>
      <div class="card-summary">${c.summary}</div>
      <ul class="bullets">
        ${c.bullets.map(b => `<li>${b}</li>`).join('')}
      </ul>
      ${c.stats && c.stats.length ? `
        <div class="stats-row">
          ${c.stats.map(s => `
            <div class="stat-item">
              <div class="stat-val">${s.val}</div>
              <div class="stat-lbl">${s.lbl}</div>
            </div>
          `).join('')}
        </div>
      ` : ''}
      <div class="tag-list">
        ${c.domain.map(d => `<span class="tag">${d}</span>`).join('')}
        ${c.platform.map(p => `<span class="tag">${p}</span>`).join('')}
      </div>
    </div>
  `).join('');
}

// 타임라인 뷰
function renderTimeline(list) {
  return `
    <div class="section-label">타임라인</div>
    <div class="timeline">
      ${list.map(c => `
        <div class="tl-item ${c.status === '재직중' ? 'current' : ''}">
          <div class="tl-dot"></div>
          <div class="tl-period">${c.period}</div>
          <div class="tl-co">${c.company} ${c.status ? '<span class="badge">'+c.status+'</span>' : ''}</div>
          <div class="tl-role">${c.role}</div>
          <div class="tl-desc">${c.summary}</div>
        </div>
      `).join('')}
    </div>
  `;
}

// 스킬
function renderSkills() {
  const sk = DATA.skills;
  return Object.values(sk).map(group => `
    <div class="card skill-group">
      <div class="skill-group-title">${group.label}</div>
      ${group.items.map((item, idx) => {
        const hasExpand = item.expand && item.expand.length > 0;
        const expandId = `expand-${group.label}-${idx}`;
        return `
        <div class="skill-row ${hasExpand ? 'has-expand' : ''}" ${hasExpand ? `onclick="toggleExpand('${expandId}')"` : ''}>
          <div class="skill-name">
            ${item.name}
            ${hasExpand ? `<span class="expand-arrow" id="arrow-${expandId}">▸</span>` : ''}
          </div>
          <div class="skill-detail">${item.detail}</div>
        </div>
        ${hasExpand ? `
        <div class="skill-expand" id="${expandId}">
          <ul class="expand-list">
            ${item.expand.map(e => `<li>${e}</li>`).join('')}
          </ul>
        </div>` : ''}
        `;
      }).join('')}
    </div>
  `).join('');
}

function toggleExpand(id) {
  const el = document.getElementById(id);
  const arrow = document.getElementById('arrow-' + id);
  if (!el) return;
  const isOpen = el.classList.contains('open');
  el.classList.toggle('open', !isOpen);
  if (arrow) arrow.textContent = isOpen ? '▸' : '▾';
}

// 포트폴리오
function renderPortfolio() {
  const pf = DATA.portfolio;
  if (!pf) return `<div class="card" style="text-align:center;padding:40px;color:var(--muted);">준비 중입니다</div>`;
  return `
    <div class="section-label">포트폴리오</div>
    ${pf.items.map(item => `
      <div class="card" style="margin-bottom:10px;">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;">
          <div>
            <div style="font-size:13px;font-weight:700;color:var(--blk);margin-bottom:4px;">${item.title}</div>
            <div style="font-size:11px;color:var(--gray);line-height:1.6;">${item.desc}</div>
          </div>
          ${item.type === 'link' ? `
            <a href="${item.link}" target="_blank" style="flex-shrink:0;font-size:10px;padding:5px 12px;border-radius:4px;border:1px solid var(--org);color:var(--org);text-decoration:none;white-space:nowrap;">열기 →</a>
          ` : `
            <span style="flex-shrink:0;font-size:10px;padding:5px 12px;border-radius:4px;border:1px solid var(--border);color:var(--muted);white-space:nowrap;">요청 시 제공</span>
          `}
        </div>
      </div>
    `).join('')}
    <div style="margin-top:14px;padding:12px 16px;background:var(--sidebar);border-radius:6px;font-size:11px;color:var(--muted);">
      GitHub 저장소 →
      <a href="${pf.github_url}" target="_blank" style="color:var(--org);text-decoration:none;">${pf.github_url}</a>
    </div>
  `;
}

// 프로젝트
function renderProjects() {
  return `
    <div class="section-label">개인 프로젝트</div>
    ${DATA.projects.map(p => `
      <div class="card" style="margin-bottom:14px">
        <div class="card-head">
          <span class="card-co">${p.name}</span>
          <span class="card-period">${p.period}</span>
          <span class="badge">${p.status}</span>
        </div>
        <div class="card-summary">${p.desc}</div>
        <ul class="bullets">
          ${p.bullets.map(b => `<li>${b}</li>`).join('')}
        </ul>
        <div class="tag-list" style="margin-top:10px">
          ${p.stack.map(s => `<span class="tag">${s}</span>`).join('')}
        </div>
      </div>
    `).join('')}
  `;
}

// 햄버거 메뉴
function toggleSidebar() {
  const sb = document.querySelector('.sidebar');
  const ov = document.getElementById('overlay');
  const isOpen = sb.classList.contains('open');
  sb.classList.toggle('open', !isOpen);
  ov.classList.toggle('open', !isOpen);
}

// 내비게이션 초기화
function initNav() {
  document.querySelectorAll('.nav-item').forEach(el => {
    el.addEventListener('click', () => {
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      el.classList.add('active');
      currentSection = el.dataset.section;

      const titles = {
        'profile': ['프로필', '요약 · 설계도 · 학력·병역'],
        'coverletter': ['자기소개서', '구상 중'],
        'education': ['학력 · 병역', '장안대학교 · 육군 병장'],
        'career-all': ['전체 경력', '10개사  ·  2012 ~ 2026'],
        'career-public': ['국책사업 경력', '공공 AI 도메인'],
        'career-game': ['게임 QA 경력', '모바일 · PC · 10+ 타이틀'],
        'career-other': ['메타버스 · OTT · 기타', '제프 · 이비웨어'],
        'skills': ['QA 방법론 · 기술 스택', '테스트 레벨 · 유형 · 프로세스 · 접근 방식'],
        'projects': ['개인 프로젝트', 'GenAI Studio · BENYLIS 레버 · Life Compass'],
        'portfolio': ['포트폴리오', '준비 중'],
      };
      const t = titles[currentSection] || ['', ''];
      document.getElementById('topbarTitle').textContent = t[0];
      document.getElementById('topbarMeta').textContent = t[1];

      currentView = 'summary';
      document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.toggle-btn')[0].classList.add('active');

      render();

      if (window.innerWidth <= 640) toggleSidebar();
    });
  });

  // 뷰 토글
  document.querySelectorAll('.toggle-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentView = btn.dataset.view;
      render();
    });
  });
}
</script>
<script>loadData(); initNav();</script>
</body>
</html>
